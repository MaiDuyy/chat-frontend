<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ thống tạm thời bảo trì - 503 Service Unavailable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #ffffff;
      --foreground: #111111;
      --muted-foreground: #6b7280;
      --card-bg: #f5f5f5;
      --border: #e5e7eb;
      --primary: #111111;
      --primary-foreground: #ffffff;
      --accent: #fb923c;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: #101010;
        --foreground: #f9fafb;
        --muted-foreground: #a1a1aa;
        --card-bg: #1a1a1a;
        --border: rgba(255, 255, 255, 0.1);
        --primary: #ffffff;
        --primary-foreground: #101010;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background-color 0.3s ease, color 0.3s ease;
      overflow-x: hidden;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* SVG Gears Animation styling */
    .illustration-box {
      position: relative;
      width: 240px;
      height: 240px;
      margin-bottom: 32px;
      user-select: none;
    }

    .gear-main {
      transform-origin: 100px 100px;
      animation: spin-clockwise 20s linear infinite;
      color: var(--primary);
    }

    .gear-secondary {
      transform-origin: 145px 135px;
      animation: spin-counter 12s linear infinite;
      color: var(--muted-foreground);
      opacity: 0.5;
    }

    .dots {
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes spin-clockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spin-counter {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    /* Content styling */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      background-color: rgba(251, 146, 60, 0.1);
      padding: 6px 16px;
      border-radius: 9999px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    p {
      font-size: 15px;
      color: var(--muted-foreground);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* Button styling */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      padding: 0 24px;
      background-color: var(--primary);
      color: var(--primary-foreground);
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      text-decoration: none;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* Footer styling */
    .footer {
      margin-top: 64px;
      font-size: 12px;
      color: var(--muted-foreground);
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Gears Illustration -->
    <div class="illustration-box">
      <svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Connecting dots grid in background -->
        <g class="dots">
          <circle cx="40" cy="40" r="1.5" fill="currentColor" style="color: var(--muted-foreground)" />
          <circle cx="200" cy="40" r="1.5" fill="currentColor" style="color: var(--muted-foreground)" />
          <circle cx="40" cy="200" r="1.5" fill="currentColor" style="color: var(--muted-foreground)" />
          <circle cx="200" cy="200" r="1.5" fill="currentColor" style="color: var(--muted-foreground)" />
        </g>

        <!-- Big Gear (Main) -->
        <g class="gear-main">
          <!-- Main gear teeth -->
          <circle cx="100" cy="100" r="40" stroke="currentColor" stroke-width="8" stroke-dasharray="10 6" />
          <circle cx="100" cy="100" r="30" stroke="currentColor" stroke-width="1.5" />
          <!-- Inner details -->
          <line x1="100" y1="70" x2="100" y2="130" stroke="currentColor" stroke-width="2" />
          <line x1="70" y1="100" x2="130" y2="100" stroke="currentColor" stroke-width="2" />
          <circle cx="100" cy="100" r="10" fill="var(--background)" stroke="currentColor" stroke-width="2" />
        </g>

        <!-- Small Gear (Secondary) -->
        <g class="gear-secondary">
          <!-- Small gear teeth -->
          <circle cx="145" cy="135" r="24" stroke="currentColor" stroke-width="6" stroke-dasharray="8 4" />
          <circle cx="145" cy="135" r="18" stroke="currentColor" stroke-width="1.5" />
          <!-- Inner details -->
          <circle cx="145" cy="135" r="6" fill="var(--background)" stroke="currentColor" stroke-width="1.5" />
        </g>
      </svg>
    </div>

    <!-- Status Code & Detail -->
    <span class="badge">Bảo trì hệ thống</span>
    <h1>Đang nâng cấp máy chủ</h1>
    <p>Hệ thống của chúng tôi hiện đang tạm ngưng hoạt động để nâng cấp định kỳ hoặc xử lý sự cố quá tải. Vui lòng quay trở lại sau vài phút.</p>

    <!-- Reload Button -->
    <button class="btn" onclick="window.location.reload()">
      Tải lại trang
    </button>

    <div class="footer">
      &copy; OTT Chat Platform. Powered by Cloud infrastructure.
    </div>
  </div>

</body>
</html>
